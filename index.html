<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kinross Efootball League</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<style>
body {margin:0;font-family:'Poppins',sans-serif;background:#0a0f2c;color:white;}
header {background:linear-gradient(90deg,#37003c,#ff2882);padding:20px;text-align:center;font-size:28px;font-weight:bold;}
.container {padding:15px;}
.card {background:#1a1f4a;border-radius:12px;padding:15px;margin-bottom:15px;box-shadow:0 5px 15px rgba(0,0,0,0.4);}
h2 {margin-top:0;border-bottom:2px solid #ff2882;padding-bottom:5px;}
table {width:100%;border-collapse:collapse;}
th,td {padding:12px;text-align:center;}
th {background:#2b2f77;}
tr:nth-child(even){background:#222870;}
.top {background:#00ffcc;color:black;font-weight:bold;}
input {padding:8px;border-radius:6px;border:none;margin:5px;}
button {padding:10px;background:#ff2882;border:none;border-radius:6px;color:white;font-weight:bold;cursor:pointer;}
button:hover{background:#e61e73;}
.team {display:flex;align-items:center;gap:8px;justify-content:center;}
.team img {width:24px;height:24px;border-radius:50%;}
</style>
</head>
<body>

<header>🏆 Kinross Efootball League</header>

<div class="container">

<div class="card">
<h2>League Table</h2>
<table id="table"></table>
</div>

<div class="card">
<h2>Add Match Result</h2>
<input id="team1" placeholder="Team 1">
<input id="g1" type="number" placeholder="Goals">
<br>
<input id="team2" placeholder="Team 2">
<input id="g2" type="number" placeholder="Goals">
<br><br>
<button onclick="addMatch()">Add Result</button>
</div>

</div>

<script>
let logos = {
"Wishness FC":"https://via.placeholder.com/30/ff2882/ffffff?text=W",
"Kosabo":"https://via.placeholder.com/30/00ffcc/000000?text=K",
"Team a":"https://via.placeholder.com/30/ffaa00/000000?text=A",
"TEAM B":"https://via.placeholder.com/30/0099ff/ffffff?text=B",
"ZiezGeek":"https://via.placeholder.com/30/ff0000/ffffff?text=Z"
};

let teams = JSON.parse(localStorage.getItem('teams')) || {
"Wishness FC":{P:0,W:0,D:0,L:0,GF:0,GA:0,Pts:0},
"Kosabo":{P:0,W:0,D:0,L:0,GF:0,GA:0,Pts:0},
"Team a":{P:0,W:0,D:0,L:0,GF:0,GA:0,Pts:0},
"TEAM B":{P:0,W:0,D:0,L:0,GF:0,GA:0,Pts:0},
"ZiezGeek":{P:0,W:0,D:0,L:0,GF:0,GA:0,Pts:0}
};

function save(){localStorage.setItem('teams',JSON.stringify(teams));}

function updateTable(){
let table=document.getElementById('table');
table.innerHTML=`<tr><th>Pos</th><th>Team</th><th>P</th><th>W</th><th>D</th><th>L</th><th>GF</th><th>GA</th><th>Pts</th></tr>`;

let sorted=Object.entries(teams).sort((a,b)=>b[1].Pts-a[1].Pts);

sorted.forEach((t,i)=>{
let team=t[0];let d=t[1];
let cls=i===0?'top':'';
let logo=logos[team] || 'https://via.placeholder.com/30';

table.innerHTML+=`<tr class="${cls}">
<td>${i+1}</td>
<td class="team"><img src="${logo}"> ${team}</td>
<td>${d.P}</td><td>${d.W}</td><td>${d.D}</td><td>${d.L}</td>
<td>${d.GF}</td><td>${d.GA}</td><td>${d.Pts}</td>
</tr>`;
});
}

function addTeam(name){if(!teams[name]){teams[name]={P:0,W:0,D:0,L:0,GF:0,GA:0,Pts:0};}}

function addMatch(){
let t1=document.getElementById('team1').value;
let t2=document.getElementById('team2').value;
let g1=parseInt(document.getElementById('g1').value);
let g2=parseInt(document.getElementById('g2').value);

if(!t1||!t2)return;

addTeam(t1);addTeam(t2);

teams[t1].P++;teams[t2].P++;
teams[t1].GF+=g1;teams[t1].GA+=g2;
teams[t2].GF+=g2;teams[t2].GA+=g1;

if(g1>g2){teams[t1].W++;teams[t1].Pts+=3;teams[t2].L++;}
else if(g2>g1){teams[t2].W++;teams[t2].Pts+=3;teams[t1].L++;}
else{teams[t1].D++;teams[t2].D++;teams[t1].Pts++;teams[t2].Pts++;}

save();updateTable();
}

updateTable();
</script>

</body>
</html>
